{% extends "base.html" %}

{% block title %}Edit Expense — Zamah{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Edit Expense</h1>
            <p class="auth-subtitle">Update the details of your expense.</p>
        </div>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}" class="auth-form">
            <div class="form-group">
                <label for="amount">Amount (₨)</label>
                <input
                    type="number"
                    id="amount"
                    name="amount"
                    class="form-input"
                    placeholder="0.00"
                    step="0.01"
                    min="0.01"
                    value="{{ amount or '' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" class="form-input" required>
                    <option value="" disabled {% if not category %}selected{% endif %}>Select a category</option>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input
                    type="date"
                    id="date"
                    name="date"
                    class="form-input"
                    value="{{ date or '' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="description">Description <span style="color: var(--ink-faint); font-weight: 400;">(optional)</span></label>
                <textarea
                    id="description"
                    name="description"
                    class="form-input"
                    placeholder="What was this expense for?"
                    rows="3"
                    style="resize: vertical;"
                >{{ description or '' }}</textarea>
            </div>

            <button type="submit" class="btn-submit">Update Expense</button>
        </form>

        <p class="auth-switch">
            <a href="/expenses">Back to expenses</a>
        </p>
    </div>
</section>
{% endblock %}
